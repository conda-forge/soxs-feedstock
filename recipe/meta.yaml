{% set name = "soxs" %}
{% set version = "5.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/soxs-{{ version }}.tar.gz
  sha256: 65b758c1ec2a63871fdafdf3fae01a264ebab6a3b8d45fa3e8d55aaa9e2f88e0

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  skip: true  # [py<311]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - python
    - numpy
    - pip
    - cython >=0.29.21
    - setuptools >=45
    - setuptools_scm >=6.2
    - toml
    - wheel >=0.36.2
  run:
    - python
    - astropy-base >=4.0
    - tqdm
    - pooch
    - h5py >=3.0
    - scipy
    - pyyaml
    - regions
    - appdirs

test:
  imports:
    - soxs
  commands:
    - pip check
    - get_instrument_data --help
  requires:
    - pip

about:
  home: https://github.com/lynx-x-ray-observatory/soxs/
  summary: Simulated Observations of X-ray Sources
  license: BSD-3-Clause
  license_file: COPYING.txt

extra:
  recipe-maintainers:
    - jzuhone
